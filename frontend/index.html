<!--
 * @file: index.html
 * @path: roblox/frontend/index.html
 * @purpose: HTML template chính cho Roblox Key System frontend application
 * @functionality: Meta tags, security headers, anti-debug scripts, Google Fonts integration
 * @connections: Mount point cho React application tại #root, load main.jsx entry point
-->
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Roblox Key System - Hệ thống quản lý key bảo mật cao" />
    <meta name="keywords" content="roblox, key system, security, authentication" />
    <meta name="author" content="Roblox Key System" />
    
    <!-- Security headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    
    <!-- Prevent caching for security -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>Roblox Key System - Hệ thống Quản lý Key</title>
    
    <!-- Preconnect to API -->
    <link rel="preconnect" href="https://khoablabla-backend.hf.space" />
    
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
