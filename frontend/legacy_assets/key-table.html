<!--
 * @file: key-table.html
 * @path: roblox/frontend/legacy_assets/key-table.html
 * @purpose: Legacy HTML page cho key table (đã thay thế bởi React version)
 * @functionality: Key display table với basic styling, Material Icons
 * @connections: Legacy file, không còn được sử dụng trong production
-->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Key - KHOADZ System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { font-family: 'Roboto', sans-serif; }
        body { background: linear-gradient(135deg, #1e3a5f 0%, #2d1b69 100%); min-height: 100vh; }
        .main-card { background: #1a1f36; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .card-header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-radius: 12px 12px 0 0; padding: 24px; }
        .progress-bg { background: rgba(255,255,255,0.1); border-radius: 4px; height: 6px; }
        .progress-fill { background: linear-gradient(90deg, #10b981, #059669); height: 100%; border-radius: 4px; transition: width 0.3s; }
        .timer-badge { background: rgba(16,185,129,0.15); border: 1px solid #10b981; color: #10b981; padding: 8px 16px; border-radius: 8px; font-weight: 600; display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .keys-table { width: 100%; border-collapse: collapse; }
        .keys-table th { text-align: left; padding: 16px; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .keys-table td { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); color: white; vertical-align: middle; }
        .keys-table tr:hover { background: rgba(255,255,255,0.02); }
        .key-string { font-family: 'Courier New', monospace; font-size: 14px; font-weight: 500; color: white; }
        .time-green { color: #10b981; font-weight: 500; }
        .badge-active { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .btn-renew { background: transparent; border: 1px solid #10b981; color: #10b981; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px; }
        .btn-renew:hover { background: #10b981; color: white; }
        .btn-copy { background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.7); padding: 6px; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .btn-copy:hover { background: rgba(255,255,255,0.2); color: white; }
        .btn-getkey { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-getkey:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.4); }
        .btn-getkey:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-outline:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); color: white; }
        .key-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .material-icons { font-size: 16px; vertical-align: middle; }
        .link-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: none; justify-content: center; align-items: center; }
        .link-dialog { background: #1e293b; border-radius: 12px; padding: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .countdown { font-size: 18px; font-weight: bold; color: white; margin-bottom: 20px; }
    </style>
</head>
<body class="text-white p-6">
    <!-- Link Overlay -->
    <div id="linkOverlay" class="link-overlay">
        <div class="link-dialog">
            <div id="countdown" class="countdown">CLOSE IN: 5</div>
            <button id="skipBtn" onclick="completeLink()" style="display: none;" class="btn-getkey">
                <span class="material-icons">bolt</span>
                Vượt Link (<span id="overlayProgress">0/0</span>)
            </button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <!-- Main Card -->
        <div class="main-card">
            <!-- Card Header -->
            <div class="card-header">
                <div class="flex flex-col lg:flex-row items-center justify-between gap-4">
                    <h1 class="text-xl font-bold text-white">Ronix Windows Key System</h1>
                    
                    <div class="flex-1 w-full lg:w-auto lg:mx-8">
                        <div class="flex justify-between text-sm mb-2 text-gray-400">
                            <span>Progress: <span id="progressText">0/3</span></span>
                        </div>
                        <div class="progress-bg">
                            <div id="progressBar" class="progress-fill" style="width: 0%"></div>
                        </div>
                    </div>
                    
                    <div class="timer-badge">
                        <span class="material-icons" style="font-size: 16px;">hourglass_bottom</span>
                        <span id="mainTimer">01:32:50</span>
                    </div>
                </div>
            </div>

            <!-- Card Body -->
            <div class="p-0">
                <!-- Keys Table -->
                <table class="keys-table">
                    <thead>
                        <tr>
                            <th id="keysHeader">YOUR KEYS (1/1)</th>
                            <th class="text-center">TIME LEFT</th>
                            <th class="text-center">STATUS</th>
                            <th class="text-center">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Sample Key Row -->
                        <tr>
                            <td>
                                <div class="flex items-center gap-3">
                                    <button onclick="copyKey('wkWVJdtQYQprMfdNVjWSivfDemucGaCO')" class="btn-copy">
                                        <span class="material-icons" style="font-size: 14px;">content_copy</span>
                                    </button>
                                    <div class="key-icon">🔑</div>
                                    <span class="key-string">wkWVJdtQYQprMfdNVjWSivfDemucGaCO</span>
                                </div>
                            </td>
                            <td class="text-center">
                                <span id="keyTimeLeft" class="time-green font-mono">18:36:13</span>
                            </td>
                            <td class="text-center">
                                <span class="badge-active">active</span>
                            </td>
                            <td class="text-center">
                                <button onclick="renewKey('wkWVJdtQYQprMfdNVjWSivfDemucGaCO')" class="btn-renew">
                                    <span class="material-icons" style="font-size: 14px;">hourglass_bottom</span>
                                    + 24H
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- Get New Key Section -->
                <div class="p-6 text-center border-t border-white/10">
                    <button id="newKeyBtn" onclick="showLinkOverlay()" class="btn-getkey">
                        <span class="material-icons">add</span>
                        Get a new key
                    </button>
                    <button id="getKeyBtnDisabled" style="display: none;" disabled class="btn-getkey">
                        <span class="material-icons">lock</span>
                        Complete links first
                    </button>
                </div>
            </div>
        </div>

        <!-- Back Button -->
        <div class="text-center mt-6">
            <button onclick="goBack()" class="btn-outline">
                <span class="material-icons" style="font-size: 14px;">arrow_back</span>
                Quay lại chọn thời gian
            </button>
        </div>
    </div>

    <script>
        let selectedTime = 4;
        let requiredLinks = 1;
        let completedLinks = 0;
        let generatedKeys = ['wkWVJdtQYQprMfdNVjWSivfDemucGaCO'];
        let mainCooldownSeconds = 6 * 3600; // 6 hours

        document.addEventListener('DOMContentLoaded', function() {
            selectedTime = parseInt(localStorage.getItem('selectedTime') || '4');
            requiredLinks = parseInt(localStorage.getItem('selectedLinks') || '1');
            
            updateUI();
            startMainTimer();
            startKeyCountdown('keyTimeLeft', 18 * 3600 + 36 * 60 + 13); // 18:36:13 for demo
        });

        function updateUI() {
            const progress = Math.min((completedLinks / requiredLinks) * 100, 100);
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('progressText').textContent = `${completedLinks}/${requiredLinks}`;
            document.getElementById('overlayProgress').textContent = `${completedLinks}/${requiredLinks}`;
            document.getElementById('keysHeader').textContent = `YOUR KEYS (${generatedKeys.length}/1)`;
            
            // Toggle button states
            const newKeyBtn = document.getElementById('newKeyBtn');
            const disabledBtn = document.getElementById('getKeyBtnDisabled');
            
            if (completedLinks >= requiredLinks) {
                newKeyBtn.style.display = 'inline-flex';
                disabledBtn.style.display = 'none';
            } else {
                newKeyBtn.style.display = 'none';
                disabledBtn.style.display = 'inline-flex';
            }
        }

        function showLinkOverlay() {
            if (completedLinks >= requiredLinks) {
                generateNewKey();
                return;
            }
            
            const overlay = document.getElementById('linkOverlay');
            const countdown = document.getElementById('countdown');
            const skipBtn = document.getElementById('skipBtn');
            
            overlay.style.display = 'flex';
            countdown.style.display = 'block';
            skipBtn.style.display = 'none';
            
            let count = 5;
            countdown.textContent = `CLOSE IN: ${count}`;
            
            const timer = setInterval(() => {
                count--;
                countdown.textContent = `CLOSE IN: ${count}`;
                
                if (count <= 0) {
                    clearInterval(timer);
                    countdown.style.display = 'none';
                    skipBtn.style.display = 'inline-flex';
                }
            }, 1000);
        }

        function completeLink() {
            completedLinks++;
            updateUI();
            document.getElementById('linkOverlay').style.display = 'none';
            showToast(`✅ Vượt link thành công! (${completedLinks}/${requiredLinks})`);
            
            if (completedLinks >= requiredLinks) {
                setTimeout(() => generateNewKey(), 300);
            }
        }

        async function generateNewKey() {
            const btn = document.getElementById('newKeyBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span class="material-icons">hourglass_top</span> Đang tạo...';
            btn.disabled = true;
            
            try {
                const response = await fetch('http://127.0.0.1:5000/create-key', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ duration: selectedTime * 3600 })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    addKeyRow(result.key, result.duration);
                    generatedKeys.push(result.key);
                    updateUI();
                    showToast('✅ Tạo key thành công!');
                }
            } catch (error) {
                // Demo mode
                const demoKey = 'KHOA-' + selectedTime + 'H-' + Math.random().toString(36).substring(2, 12);
                addKeyRow(demoKey, selectedTime * 3600);
                generatedKeys.push(demoKey);
                updateUI();
                showToast('✅ Tạo key thành công! (Demo)');
            }
            
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }

        function addKeyRow(key, duration) {
            const tbody = document.querySelector('.keys-table tbody');
            const timeId = 'timeLeft_' + Date.now();
            
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <div class="flex items-center gap-3">
                        <button onclick="copyKey('${key}')" class="btn-copy">
                            <span class="material-icons" style="font-size: 14px;">content_copy</span>
                        </button>
                        <div class="key-icon">🔑</div>
                        <span class="key-string">${key}</span>
                    </div>
                </td>
                <td class="text-center">
                    <span id="${timeId}" class="time-green font-mono">${formatTime(duration)}</span>
                </td>
                <td class="text-center">
                    <span class="badge-active">active</span>
                </td>
                <td class="text-center">
                    <button onclick="renewKey('${key}')" class="btn-renew">
                        <span class="material-icons" style="font-size: 14px;">hourglass_bottom</span>
                        + 24H
                    </button>
                </td>
            `;
            
            tbody.appendChild(row);
            startKeyCountdown(timeId, duration);
        }

        function startKeyCountdown(elementId, seconds) {
            let remaining = seconds;
            const element = document.getElementById(elementId);
            if (!element) return;
            
            const interval = setInterval(() => {
                remaining--;
                element.textContent = formatTime(remaining);
                
                if (remaining < 300) element.style.color = '#ef4444'; // Red when < 5 min
                
                if (remaining <= 0) {
                    clearInterval(interval);
                    element.textContent = 'EXPIRED';
                    element.style.color = '#ef4444';
                }
            }, 1000);
        }

        function startMainTimer() {
            const timerEl = document.getElementById('mainTimer');
            
            const interval = setInterval(() => {
                if (mainCooldownSeconds > 0) {
                    mainCooldownSeconds--;
                    timerEl.textContent = formatTime(mainCooldownSeconds);
                } else {
                    clearInterval(interval);
                    timerEl.parentElement.innerHTML = '<span class="material-icons">check_circle</span> <span>Ready</span>';
                }
            }, 1000);
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key).then(() => {
                showToast('✅ Đã copy key!');
            });
        }

        function renewKey(key) {
            showToast('⏳ Đang gia hạn key...');
            // Call API to renew key
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-xl z-50 font-medium';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
